<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitinvikas Construction – Government Contractors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;overflow-x:hidden}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
    @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
    .fade-up{animation:fadeInUp .8s ease forwards}
    .floating{animation:float 5s ease-in-out infinite}
    .marquee-inner{animation:marquee 28s linear infinite;display:inline-flex;white-space:nowrap}
    .gradient-text{background:linear-gradient(135deg,#22c55e,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .card-hover{transition:all .3s ease}
    .card-hover:hover{transform:translateY(-8px);box-shadow:0 24px 48px rgba(22,163,74,.18)}
    .glass{background:rgba(255,255,255,.08);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.18)}
    .section-hidden{opacity:0;transform:translateY(24px);transition:all .7s ease}
    .section-visible{opacity:1;transform:translateY(0)}
    .hero-bg{background:linear-gradient(135deg,#0a1628 0%,#0f2d18 40%,#0f2240 80%,#071020 100%)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

function useVisible(t=.15){
  const r=useRef(null);const[v,s]=useState(false);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)s(true)},{threshold:t});if(r.current)o.observe(r.current);return()=>o.disconnect()},[]);
  return[r,v];
}

function Counter({to,suf='',dur=2200}){
  const[n,setN]=useState(0);const[r,v]=useVisible();
  useEffect(()=>{if(!v)return;let c=0;const step=to/(dur/16);const t=setInterval(()=>{c+=step;if(c>=to){setN(to);clearInterval(t);}else setN(Math.floor(c));},16);return()=>clearInterval(t);},[v,to,dur]);
  return <span ref={r}>{n}{suf}</span>;
}

function Navbar(){
  const[sc,setSc]=useState(false);const[open,setOpen]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>60);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h)},[]);
  return(
    <nav className={`fixed w-full z-50 transition-all duration-300 ${sc?'bg-gray-950 shadow-2xl':'bg-transparent'}`}>
      <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-green-600 flex items-center justify-center text-white text-xl font-black">S</div>
          <div><div className="text-white font-black text-lg leading-none">Nitinvikas Construction</div><div className="text-green-400 text-xs font-semibold tracking-wider">INFRASTRUCTURE PVT. LTD.</div></div>
        </div>
        <div className="hidden md:flex items-center gap-8">
          {['Services','Projects','Certifications','Contact'].map(l=><a key={l} href={`#${l.toLowerCase()}`} className="text-gray-300 hover:text-green-400 font-medium transition-colors">{l}</a>)}
          <a href="#contact" className="border-2 border-green-500 text-green-400 hover:bg-green-500 hover:text-white px-6 py-2.5 rounded-lg font-bold transition-all">Bid Enquiry</a>
        </div>
        <button onClick={()=>setOpen(!open)} className="md:hidden text-white text-2xl">☰</button>
      </div>
      {open&&<div className="md:hidden bg-gray-950 border-t border-gray-800">
        {['Services','Projects','Certifications','Contact'].map(l=><a key={l} onClick={()=>setOpen(false)} href={`#${l.toLowerCase()}`} className="block px-6 py-4 text-gray-300 hover:text-green-400 border-b border-gray-800">{l}</a>)}
      </div>}
    </nav>
  );
}

function Hero(){
  return(
    <section className="hero-bg min-h-screen flex flex-col justify-center relative overflow-hidden">
      <div className="absolute inset-0 pointer-events-none">
        <div className="absolute top-20 right-20 w-96 h-96 bg-green-900/20 rounded-full blur-3xl"></div>
        <div className="absolute bottom-20 left-10 w-64 h-64 bg-blue-900/20 rounded-full blur-3xl"></div>
      </div>
      <div className="max-w-7xl mx-auto px-6 py-32 grid md:grid-cols-2 gap-12 items-center relative z-10">
        <div className="fade-up">
          <div className="flex flex-wrap gap-2 mb-6">
            {['🏛️ CPWD Class AA','✅ ISO 9001:2015','🛣️ NHAI Empanelled'].map(b=><span key={b} className="glass text-green-300 text-xs font-semibold px-4 py-2 rounded-full">{b}</span>)}
          </div>
          <h1 className="text-5xl md:text-7xl font-black text-white leading-none mb-6" style={{fontFamily:'Montserrat'}}>
            Building<br/><span className="gradient-text">India's</span><br/>Future
          </h1>
          <p className="text-gray-300 text-lg leading-relaxed mb-8 max-w-lg">Tier-1 government contractor delivering highways, bridges, hospitals, and strategic infrastructure across 18 states since 1998.</p>
          <div className="flex flex-wrap gap-4">
            <a href="#contact" className="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all hover:scale-105 shadow-lg shadow-green-900/50">Request a Bid →</a>
            <a href="#projects" className="glass text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-white/15 transition-colors">View Projects</a>
          </div>
        </div>
        <div className="hidden md:flex justify-center">
          <div className="floating relative">
            <div className="absolute inset-0 bg-green-500/10 rounded-3xl blur-2xl scale-110"></div>
            <div className="glass rounded-3xl p-12 text-center">
              <div className="text-9xl mb-4">🏗️</div>
              <div className="grid grid-cols-2 gap-3 mt-4">
                <div className="bg-green-900/40 rounded-xl p-3 text-center"><div className="text-white font-black text-2xl">₹4200Cr</div><div className="text-green-400 text-xs">Projects Done</div></div>
                <div className="bg-green-900/40 rounded-xl p-3 text-center"><div className="text-white font-black text-2xl">340+</div><div className="text-green-400 text-xs">Contracts</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div className="bg-green-900/50 border-t border-green-800/50 overflow-hidden py-3">
        <div className="marquee-inner gap-0">
          {[...Array(2)].map((_,i)=>(
            <div key={i} className="flex items-center gap-0">
              {['🏛️ CPWD Class AA Contractor','🛣️ NHAI Empanelled','🏥 AIIMS Projects Delivered','🌉 200+ Bridges Built','✅ ISO 9001:2015','🔒 Defence Ministry Partner','⭐ 28 Years of Excellence','🇮🇳 Pan-India Operations'].map(t=>(
                <span key={t} className="text-green-300 text-sm font-semibold px-8 border-r border-green-700/50">{t}</span>
              ))}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Stats(){
  const stats=[{to:4200,suf:'Cr+',label:'Projects Value (₹)',icon:'💰'},{to:28,suf:'+',label:'Years in Business',icon:'📅'},{to:340,suf:'+',label:'Govt Contracts',icon:'📋'},{to:18,suf:'',label:'States Operational',icon:'🗺️'}];
  return(
    <section className="bg-green-700 py-16">
      <div className="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-6">
        {stats.map(s=>(
          <div key={s.label} className="text-center group">
            <div className="text-4xl mb-3 group-hover:scale-125 transition-transform">{s.icon}</div>
            <div className="text-4xl md:text-5xl font-black text-white mb-1"><Counter to={s.to} suf={s.suf}/></div>
            <div className="text-green-200 font-medium text-sm">{s.label}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Services(){
  const[r,v]=useVisible(.1);
  const svcs=[
    {i:'🛣️',t:'Roads & Highways',d:'4-lane/6-lane national highways, expressways under NHAI and MoRTH.'},
    {i:'🌉',t:'Bridges & Flyovers',d:'RCC, prestressed and steel bridges including railway overbridges.'},
    {i:'🏛️',t:'Public Buildings',d:'Hospitals, courts, government offices and institutions under CPWD.'},
    {i:'💧',t:'Water Infrastructure',d:'Dams, irrigation canals, water treatment plants — Jal Jeevan Mission.'},
    {i:'⚡',t:'Power & Utilities',d:'Substations, transmission lines, renewable energy grid infrastructure.'},
    {i:'🛡️',t:'Defence Construction',d:'Strategic cantonments, border roads under BRO contracts.'},
  ];
  return(
    <section id="services" className="py-28 bg-gray-50">
      <div className="max-w-7xl mx-auto px-6">
        <div className="text-center mb-16">
          <span className="text-green-600 font-semibold text-sm uppercase tracking-wider">What We Build</span>
          <h2 className="text-4xl md:text-5xl font-black text-gray-900 mt-3 mb-4">Core <span className="gradient-text">Competencies</span></h2>
          <p className="text-gray-500 text-lg max-w-2xl mx-auto">Specialised capabilities for government infrastructure of every scale</p>
        </div>
        <div ref={r} className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
          {svcs.map((s,i)=>(
            <div key={s.t} className={`bg-white rounded-2xl p-8 card-hover border border-gray-100 border-t-4 border-t-green-600 ${v?'fade-up':'opacity-0'}`} style={{animationDelay:`${i*.1}s`}}>
              <div className="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center text-3xl mb-5">{s.i}</div>
              <h3 className="text-xl font-bold text-gray-900 mb-3">{s.t}</h3>
              <p className="text-gray-500 leading-relaxed text-sm">{s.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Projects(){
  const projects=[
    {e:'🛣️',ministry:'Ministry of Road Transport & Highways',title:'NH-48 6-Lane Widening – Gurugram to Jaipur',desc:'220 km highway upgrade with 12 flyovers, 3 tunnels, smart traffic management.',value:'₹2,800 Cr',status:'completed'},
    {e:'🏥',ministry:'Ministry of Health & Family Welfare',title:'AIIMS Jammu – Full Campus Construction',desc:'750-bed teaching hospital with OPD, ICU, research labs and residential quarters.',value:'₹680 Cr',status:'completed'},
    {e:'🌉',ministry:'Ministry of Railways',title:'Chenab River Rail Bridge Approaches – J&K',desc:'High-altitude viaducts and connecting tunnels for world\'s highest railway bridge.',value:'₹320 Cr',status:'ongoing'},
    {e:'💧',ministry:'Ministry of Jal Shakti',title:'Ken-Betwa River Link Project – MP',desc:'Irrigation canal network across 3 districts with 14 lift irrigation stations.',value:'₹510 Cr',status:'ongoing'},
  ];
  return(
    <section id="projects" className="py-28 bg-white">
      <div className="max-w-7xl mx-auto px-6">
        <div className="text-center mb-16">
          <span className="text-green-600 font-semibold text-sm uppercase tracking-wider">Track Record</span>
          <h2 className="text-4xl md:text-5xl font-black text-gray-900 mt-3 mb-4">Landmark <span className="gradient-text">Projects</span></h2>
        </div>
        <div className="grid md:grid-cols-2 gap-8">
          {projects.map(p=>(
            <div key={p.title} className="rounded-2xl overflow-hidden shadow-lg card-hover border border-gray-100">
              <div className="bg-gradient-to-r from-green-800 to-green-600 p-8 flex items-center gap-4">
                <div className="text-6xl">{p.e}</div>
                <div><div className="text-green-200 text-xs font-bold uppercase tracking-wider mb-1">{p.ministry}</div>
                  <div className="text-white font-bold text-lg leading-snug">{p.title}</div></div>
              </div>
              <div className="p-6">
                <p className="text-gray-600 leading-relaxed mb-4">{p.desc}</p>
                <div className="flex items-center justify-between">
                  <span className="text-gray-900 font-black text-lg">{p.value}</span>
                  <span className={`px-4 py-1.5 rounded-full text-sm font-bold ${p.status==='completed'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                    {p.status==='completed'?'✅ Completed':'🔄 Ongoing'}
                  </span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Certifications(){
  const certs=['🏛️ CPWD – Class AA','🛣️ NHAI Empanelled','✅ ISO 9001:2015','⚙️ ISO 14001:2015','🔒 ISO 45001:2018','🏗️ MoRTH Registered','🛡️ MoD Defence Contractor','💧 Jal Jeevan Mission','🌿 GEM Portal Registered'];
  return(
    <section id="certifications" className="py-28 bg-gray-50">
      <div className="max-w-7xl mx-auto px-6 text-center">
        <span className="text-green-600 font-semibold text-sm uppercase tracking-wider">Credentials</span>
        <h2 className="text-4xl md:text-5xl font-black text-gray-900 mt-3 mb-4">Certifications & <span className="gradient-text">Registrations</span></h2>
        <p className="text-gray-500 mb-12">Fully compliant and empanelled with all major central and state bodies</p>
        <div className="flex flex-wrap justify-center gap-4">
          {certs.map(c=><div key={c} className="bg-white border-2 border-green-600 rounded-xl px-6 py-4 text-green-800 font-bold hover:bg-green-600 hover:text-white transition-all cursor-default shadow-sm">{c}</div>)}
        </div>
      </div>
    </section>
  );
}

function Contact(){
  const[form,setForm]=useState({company:'',name:'',email:'',phone:'',type:'Tender / Bid',details:''});
  const[ok,setOk]=useState(false);
  return(
    <section id="contact" className="py-28 bg-gray-900">
      <div className="max-w-7xl mx-auto px-6">
        <div className="text-center mb-16">
          <span className="text-green-400 font-semibold text-sm uppercase tracking-wider">Work With Us</span>
          <h2 className="text-4xl font-black text-white mt-3 mb-3">Bid Enquiry & <span className="gradient-text">Contact</span></h2>
          <p className="text-gray-400">For tenders, joint ventures, and subcontractor empanelment</p>
        </div>
        <div className="grid md:grid-cols-2 gap-12">
          <div>
            {[['📍','Corporate Office','Nitinvikas Construction House, Plot 7, Sector 125, Noida – 201301, UP'],['📞','Telephone','+91 120 456 7890\n+91 98700 12345 (Tender Cell)'],['✉️','Email','tenders@nitinvikas.in\ninfo@nitinvikas.in'],['🌐','Registration','CIN: U45200UP1998PTC024156\nGST: 09AABCS1234F1Z5'],['⏰','Office Hours','Mon–Fri: 9 AM – 6 PM\nTender submissions: 24/7 via email']].map(([ic,l,v])=>(
              <div key={l} className="flex gap-4 mb-6">
                <div className="w-12 h-12 bg-green-900/50 rounded-xl flex items-center justify-center text-xl flex-shrink-0">{ic}</div>
                <div><div className="text-green-400 font-bold mb-1">{l}</div><div className="text-gray-300 text-sm leading-relaxed whitespace-pre-line">{v}</div></div>
              </div>
            ))}
          </div>
          <div className="bg-gray-800 rounded-2xl p-8">
            {ok?<div className="text-center py-12"><div className="text-6xl mb-4">✅</div><h3 className="text-2xl font-bold text-white mb-2">Enquiry Received!</h3><p className="text-gray-400">Our tender team will respond within 48 hours.</p><button onClick={()=>setOk(false)} className="mt-6 text-green-400 font-semibold">Submit another →</button></div>:(
              <form onSubmit={e=>{e.preventDefault();setOk(true)}} className="space-y-4">
                <h3 className="text-white font-bold text-xl mb-6">Submit Bid Enquiry</h3>
                <input required value={form.company} onChange={e=>setForm({...form,company:e.target.value})} placeholder="Company / Organisation Name" className="w-full bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none placeholder-gray-400"/>
                <div className="grid grid-cols-2 gap-4">
                  <input required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Contact Person" className="bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none placeholder-gray-400"/>
                  <input required value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="Phone Number" className="bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none placeholder-gray-400"/>
                </div>
                <input required type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Official Email" className="w-full bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none placeholder-gray-400"/>
                <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})} className="w-full bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none">
                  {['Tender / Bid Submission','Joint Venture Proposal','Subcontractor Empanelment','General Enquiry'].map(o=><option key={o}>{o}</option>)}
                </select>
                <textarea value={form.details} onChange={e=>setForm({...form,details:e.target.value})} rows="4" placeholder="Project details, scope, estimated value, deadline…" className="w-full bg-gray-700 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-green-500 outline-none placeholder-gray-400 resize-none"/>
                <button type="submit" className="w-full bg-green-600 hover:bg-green-500 text-white py-4 rounded-xl font-bold text-lg transition-all hover:scale-105">Submit Enquiry →</button>
              </form>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer(){
  return(
    <footer className="bg-black text-gray-500 py-16">
      <div className="max-w-7xl mx-auto px-6">
        <div className="grid md:grid-cols-4 gap-10 mb-12">
          <div className="col-span-2">
            <div className="flex items-center gap-2 mb-4">
              <div className="w-10 h-10 rounded-xl bg-green-700 flex items-center justify-center text-white font-black">S</div>
              <div className="text-white font-black text-lg">Nitinvikas Construction Pvt. Ltd.</div>
            </div>
            <p className="text-sm leading-relaxed mb-4">Building India's future infrastructure since 1998. CPWD Class AA | ISO Certified | NHAI Empanelled.</p>
            <p className="text-green-600 text-xs">CIN: U45200UP1998PTC024156</p>
          </div>
          <div><h4 className="text-white font-bold mb-4">Quick Links</h4>{['Services','Projects','Certifications','Bid Enquiry'].map(l=><div key={l} className="py-1 hover:text-green-400 cursor-pointer transition-colors text-sm">{l}</div>)}</div>
          <div><h4 className="text-white font-bold mb-4">Contact</h4><div className="space-y-2 text-sm"><div>📍 Sector 125, Noida</div><div>📞 +91 120 456 7890</div><div>✉️ info@nitinvikas.in</div></div></div>
        </div>
        <div className="border-t border-gray-900 pt-8 text-center text-xs">© 2026 Nitinvikas Construction Pvt. Ltd. All rights reserved.</div>
      </div>
    </footer>
  );
}

function App(){
  return(<><Navbar/><Hero/><Stats/><Services/><Projects/><Certifications/><Contact/><Footer/></>);
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
